# ============================================================
# MediChain - Application Configuration
# ============================================================

server.port=8080

# MySQL Database Configuration
# Override with env vars DB_URL / DB_USERNAME / DB_PASSWORD for cloud hosting.
# Example (Aiven / Clever Cloud / Railway):
#   DB_URL=jdbc:mysql://<host>:<port>/<db>?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medichain?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Static files
spring.web.resources.static-locations=classpath:/static/

# JWT Secret
app.jwt.secret=MediChainSecretKey2026SpringDBMSProject
app.jwt.expiration=86400000
